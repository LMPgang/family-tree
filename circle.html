        // 压缩图片
        function compressImage(dataUrl, maxW, maxH, quality) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });

            '🔑','🗝️','🔒','🔓','🛡️','🔧','🔨','⚒️','🛠️','⛏️','🪓','🔩','⚙️','🧲','🪜','🧰','🧲',
            '💰','🪙','💴','💵','💶','💷','💳','🧾','💹','✉️','📧','📨','📩','📤','📥','📦','🏷️','🪧','📪','📫','📬','📭','📮','📯',
            '🧹','🧺','🧻','🪣','🧼','🪥','🧽','🧴','🛒','🚿','🛁','🪤','🪒','🧷','🧹','🪕','🪖','🪗','🪘',
            // 天气/自然
            '☀️','🌤️','⛅','🌥️','☁️','🌦️','🌧️','⛈️','🌩️','🌨️','❄️','☃️','⛄','🌬️','💨','🌪️','🌫️','🌊','💧','💦','🫧',
            '🌈','🌙','🌚','🌛','🌜','🌡️','🌅','🌄','🌇',' dusk','🌃','🏙️','🌌','🌉','🌁'
        ];

        function initEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            if (!picker) return;
            let html = '<div class="emoji-grid">';
            emojiList.forEach(e => { html += `<span onclick="insertEmoji('${e}')">${e}</span>`; });
            html += '</div>';
            picker.innerHTML = html;
        }

        function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('open'); }
        function insertEmoji(emoji) { const input = document.getElementById('circleInput'); input.value += emoji; input.focus(); document.getElementById('emojiPicker').classList.remove('open'); }
        document.addEventListener('click', (e) => { const picker = document.getElementById('emojiPicker'); if (picker && !e.target.closest('.composer-emoji')) picker.classList.remove('open'); });

        // 初始化发布区
        if (isLoggedIn) {
            document.getElementById('composerCard').style.display = 'block';
            const avatarEl = document.getElementById('composerAvatar');
            try {
                const avatarSrc = authSystem.getUserAvatar(currentUser);
                if (avatarSrc) { avatarEl.innerHTML = `<img src="${avatarSrc}" alt="">`; }
                else { avatarEl.textContent = currentUser.charAt(0); }
            } catch(e) { avatarEl.textContent = currentUser.charAt(0); }
            initEmojiPicker();
        }

        function getUserAvatar(user) {
            const avatarSrc = authSystem.getUserAvatar(user);
            if (avatarSrc) return `<img src="${avatarSrc}" alt="">`;
            return user.charAt(0);
        }

        function addCircleImages(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = async ev => { const compressed = await compressImage(ev.target.result, 800, 600, 0.6); pendingImages.push(compressed); renderPendingImgs(); };
                reader.readAsDataURL(file);
            });
            e.target.value = '';
        }

        function renderPendingImgs() {
            document.getElementById('composerImgPreview').innerHTML = pendingImages.map((src, i) => `<img src="${src}" onclick="pendingImages.splice(${i},1);renderPendingImgs()">`).join('');
        }

        function publishCircle() {
            const input = document.getElementById('circleInput');
            const content = input.value.trim();
            if (!content && pendingImages.length === 0) return;
            const newPost = { user: currentUser, time: new Date().toLocaleString('zh-CN'), content, images: [...pendingImages], likes: 0, likedBy: [], comments: [] };
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { circlePosts = []; }
            circlePosts.unshift(newPost);
            try { localStorage.setItem('familyCircle', JSON.stringify(circlePosts)); } catch(e) { alert('存储空间不足，请减少图片数量'); return; }
            let myPosts = [];
            try { myPosts = JSON.parse(localStorage.getItem('familyPosts_' + currentUser) || '[]'); } catch(e) { myPosts = []; }
            myPosts.unshift({...newPost});
            try { localStorage.setItem('familyPosts_' + currentUser, JSON.stringify(myPosts)); } catch(e) {}
            input.value = ''; pendingImages = []; renderPendingImgs(); renderFeed();
        }

        function toggleLike(index) {
            if (!isLoggedIn) return;
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { return; }
            if (!circlePosts[index]) return;
            if (!circlePosts[index].likedBy) { circlePosts[index].likedBy = []; circlePosts[index].likes = 0; }
            const li = circlePosts[index].likedBy.indexOf(currentUser);
            if (li >= 0) { circlePosts[index].likedBy.splice(li, 1); circlePosts[index].likes = Math.max(0, (circlePosts[index].likes || 1) - 1); }
            else { circlePosts[index].likedBy.push(currentUser); circlePosts[index].likes = (circlePosts[index].likes || 0) + 1; }
            localStorage.setItem('familyCircle', JSON.stringify(circlePosts));
            renderFeed();
        }

        function addComment(index) {
            if (!isLoggedIn) return;
            const input = document.getElementById('commentInput_' + index);
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { return; }
            if (!circlePosts[index]) return;
            if (!circlePosts[index].comments) circlePosts[index].comments = [];
            circlePosts[index].comments.push({ user: currentUser, text, time: new Date().toLocaleString('zh-CN') });
            localStorage.setItem('familyCircle', JSON.stringify(circlePosts));
            renderFeed();
        }

        function insertCommentEmoji(index, emoji) { const input = document.getElementById('commentInput_' + index); if (input) { input.value += emoji; input.focus(); } const picker = document.getElementById('commentEmojiPicker_' + index); if (picker) picker.classList.remove('open'); }
        function toggleCommentEmojiPicker(index) { const picker = document.getElementById('commentEmojiPicker_' + index); if (picker) picker.classList.toggle('open'); }

        // admin 删除动态
        function adminDeletePost(index) {
            if (!isAdmin) return;
            if (!confirm('确定删除这条动态？')) return;
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { return; }
            circlePosts.splice(index, 1);
            localStorage.setItem('familyCircle', JSON.stringify(circlePosts));
            renderFeed();
        }

        // admin 修改动态内容
        function adminEditPost(index) {
            if (!isAdmin) return;
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { return; }
            if (!circlePosts[index]) return;
            const newContent = prompt('修改动态内容：', circlePosts[index].content || '');
            if (newContent === null) return;
            circlePosts[index].content = newContent;
            localStorage.setItem('familyCircle', JSON.stringify(circlePosts));
            renderFeed();
        }

        // 全屏图片查看器
        let viewerImages = [];
        let viewerIndex = 0;

        function openViewer(images, idx) {
            viewerImages = images;
            viewerIndex = idx;
            updateViewer();
            document.getElementById('imgViewer').classList.add('visible');
        }

        function closeViewer() {
            document.getElementById('imgViewer').classList.remove('visible');
        }

        function viewerSlide(dir) {
            viewerIndex += dir;
            if (viewerIndex < 0) viewerIndex = viewerImages.length - 1;
            if (viewerIndex >= viewerImages.length) viewerIndex = 0;
            updateViewer();
        }

        function updateViewer() {
            document.getElementById('viewerImg').src = viewerImages[viewerIndex];
            document.getElementById('viewerCounter').textContent = `${viewerIndex + 1} / ${viewerImages.length}`;
            document.getElementById('viewerLeft').style.display = viewerImages.length > 1 ? 'flex' : 'none';
            document.getElementById('viewerRight').style.display = viewerImages.length > 1 ? 'flex' : 'none';
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('imgViewer').classList.contains('visible')) return;
            if (e.key === 'ArrowLeft') viewerSlide(-1);
            else if (e.key === 'ArrowRight') viewerSlide(1);
            else if (e.key === 'Escape') closeViewer();
        });

        function renderFeed() {
            let circlePosts = [];
            try { circlePosts = JSON.parse(localStorage.getItem('familyCircle') || '[]'); } catch(e) { circlePosts = []; }
            const el = document.getElementById('circleFeed');

            if (circlePosts.length === 0) {
                el.innerHTML = '<div class="no-feed">还没有动态，来发布第一条吧</div>';
                return;
            }

            el.innerHTML = circlePosts.map((post, i) => {
                const avatarHTML = getUserAvatar(post.user);
                const isLiked = isLoggedIn && post.likedBy && post.likedBy.includes(currentUser);
                const likeClass = isLiked ? 'feed-action-btn liked' : 'feed-action-btn';
                const contentHTML = post.content ? `<div class="feed-content">${post.content}</div>` : '';

                // 微信朋友圈风格图片网格
                let imagesHTML = '';
                if (post.images && post.images.length > 0) {
                    const count = post.images.length;
                    const gClass = count <= 9 ? 'g' + count : 'g9';
                    // 存储图片列表到全局，供点击时使用
                    const imgId = 'imgs_' + i;
                    imagesHTML = `<div class="feed-img-grid ${gClass}">${post.images.map((src, imgIdx) =>
                        `<img src="${src}" onclick="openViewer(circlePostImages[${i}],${imgIdx})" alt="图片">`
                    ).join('')}</div>`;
                }

                // admin 操作按钮
                let adminHTML = '';
                if (isAdmin) {
                    adminHTML = `<span class="feed-admin-btn" onclick="adminEditPost(${i})">编辑</span><span class="feed-admin-btn" onclick="adminDeletePost(${i})" style="margin-left:8px;">删除</span>`;
                }

                // 评论区
                const comments = post.comments || [];
                let commentsHTML = '';
                if (comments.length > 0 || isLoggedIn) {
                    const commentsListHTML = comments.map(c => {
                        const cAvatar = getUserAvatar(c.user);
                        return `<div class="comment-item"><div class="comment-avatar">${cAvatar}</div><div class="comment-body"><span class="comment-user">${c.user}</span> <span class="comment-text">${c.text}</span><div class="comment-time">${c.time}</div></div></div>`;
                    }).join('');

                    let commentInputHTML = '';
                    if (isLoggedIn) {
                        const miniEmojiGrid = emojiList.slice(0, 80).map(e => `<span onclick="insertCommentEmoji(${i},'${e}')" style="font-size:1rem;cursor:pointer;padding:2px;">${e}</span>`).join('');
                        commentInputHTML = `
                            <div class="comment-input-row" style="position:relative;">
                                <span class="comment-emoji-btn" onclick="toggleCommentEmojiPicker(${i})">&#128522;</span>
                                <div class="comment-emoji-picker" id="commentEmojiPicker_${i}" onclick="event.stopPropagation()" style="bottom:34px;left:20px;">${miniEmojiGrid}</div>
                                <input type="text" id="commentInput_${i}" placeholder="写评论..." onkeydown="if(event.key==='Enter')addComment(${i})">
                                <button onclick="addComment(${i})">发送</button>
                            </div>
                        `;
                    }
                    commentsHTML = `<div class="comments-section">${commentsListHTML}${commentInputHTML}</div>`;
                }

                return `
                    <div class="feed-item">
                        <div class="feed-header">
                            <div class="feed-avatar">${avatarHTML}</div>
                            <div class="feed-user-info">
                                <div class="feed-username">${post.user}</div>
                                <div class="feed-time">${post.time}</div>
                            </div>
                            ${adminHTML}
                        </div>
                        ${contentHTML}
                        ${imagesHTML}
                        <div class="feed-actions">
                            <span class="${likeClass}" onclick="toggleLike(${i})">&#10084; ${post.likes || 0}</span>
                            <span class="feed-action-btn" onclick="document.getElementById('commentInput_${i}')&&document.getElementById('commentInput_${i}').focus()">&#128172; 评论 ${comments.length > 0 ? comments.length : ''}</span>
                        </div>
                        ${commentsHTML}
                    </div>
                `;
            }).join('');

            // 缓存图片列表供查看器使用
            window.circlePostImages = circlePosts.map(p => p.images || []);
        }

        renderFeed();
    </script>

    <script>
    // 强制横屏：竖屏时显示提示遮罩
    (function() {
        var style = document.createElement('style');
        style.textContent = '@media screen and (orientation: portrait) { #landscapeOverlay { display: flex !important; } } #landscapeOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,55,40,0.97); z-index: 99999; align-items: center; justify-content: center; flex-direction: column; } #landscapeOverlay .rotate-icon { font-size: 4rem; animation: rotateHint 2s ease-in-out infinite; margin-bottom: 20px; } @keyframes rotateHint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } } #landscapeOverlay .hint-text { color: #FFF8DC; font-size: 1.3rem; font-family: KaiTi,SimSun,serif; letter-spacing: 3px; }';
        document.head.appendChild(style);
        var overlay = document.createElement('div');
        overlay.id = 'landscapeOverlay';
        overlay.innerHTML = '<div class="rotate-icon">&#128241;</div><div class="hint-text">请横屏查看以获得最佳体验</div>';
        document.body.appendChild(overlay);
    })();
    </script>
</body>
</html>
