<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no">
    <title>老宅展示 - 家族族谱网站</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .house-page { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .house-page h1 { text-align: center; color: #8B4513; font-family: 'KaiTi','SimSun',serif; font-size: 2rem; margin-bottom: 8px; }
        .house-page .subtitle { text-align: center; color: #A0522D; font-size: 1rem; margin-bottom: 20px; }

        /* 搜索+切换 */
        .house-toolbar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { padding: 8px 14px; border: 2px solid #DAA520; border-radius: 8px; font-size: 0.9rem; background: rgba(255,255,255,0.8); outline: none; width: 200px; }
        .search-box input:focus { border-color: #8B4513; }
        .search-box button { padding: 8px 16px; background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .view-toggle { display: flex; gap: 8px; }
        .view-toggle button { padding: 8px 18px; border: 2px solid #DAA520; border-radius: 8px; background: rgba(255,248,220,0.9); color: #8B4513; font-family: 'KaiTi','SimSun',serif; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
        .view-toggle button.active { background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border-color: #8B4513; }

        /* admin按钮 */
        .admin-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .admin-btn { padding: 8px 20px; background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border: none; border-radius: 8px; cursor: pointer; font-family: 'KaiTi','SimSun',serif; font-size: 0.9rem; transition: all 0.3s; }
        .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139,69,19,0.3); }

        /* 宅基地卡片 */
        .plot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .plot-card { background: rgba(255,248,220,0.92); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s; border: 2px solid rgba(218,165,32,0.3); }
        .plot-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .plot-card-header { background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .plot-card-header h3 { font-family: 'KaiTi','SimSun',serif; font-size: 1.1rem; margin: 0; }
        .plot-card-header .plot-admin-btns { display: flex; gap: 6px; }
        .plot-card-header .plot-admin-btns button { background: rgba(255,248,220,0.2); color: #FFF8DC; border: 1px solid rgba(255,248,220,0.4); border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
        .plot-card-header .plot-admin-btns button:hover { background: rgba(255,248,220,0.4); }
        .plot-card-body { padding: 16px 20px; }

        /* 时间线 */
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #DAA520, #8B4513); }
        .timeline-node { position: relative; margin-bottom: 16px; padding-left: 20px; }
        .timeline-node::before { content: ''; position: absolute; left: -18px; top: 8px; width: 12px; height: 12px; background: #8B4513; border: 2px solid #DAA520; border-radius: 50%; z-index: 1; }
        .timeline-node:hover::before { background: #DAA520; transform: scale(1.2); }
        .node-year { color: #A0522D; font-size: 0.8rem; font-weight: bold; }
        .node-label { color: #8B4513; font-size: 0.95rem; font-weight: bold; margin: 2px 0; font-family: 'KaiTi','SimSun',serif; }
        .node-desc { color: #555; font-size: 0.82rem; line-height: 1.5; }
        .node-photos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .node-photos img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; transition: transform 0.3s; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .node-photos img:hover { transform: scale(1.1); }
        .node-actions { display: flex; gap: 6px; margin-top: 6px; }
        .node-actions button { padding: 2px 8px; font-size: 0.72rem; border: 1px solid #DAA520; border-radius: 4px; background: rgba(255,248,220,0.8); color: #8B4513; cursor: pointer; }
        .node-actions button:hover { background: #8B4513; color: #FFF8DC; }
        .add-node-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; padding: 5px 14px; background: rgba(139,69,19,0.08); border: 1px dashed #DAA520; border-radius: 8px; color: #8B4513; cursor: pointer; font-size: 0.82rem; font-family: 'KaiTi','SimSun',serif; transition: all 0.3s; }
        .add-node-btn:hover { background: rgba(139,69,19,0.15); border-color: #8B4513; }

        /* 3D立体展示 */
        .view-3d .timeline { display: none; }
        .view-3d .stage-cards { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
        .view-3d .stage-card { min-width: 180px; background: rgba(139,69,19,0.06); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid rgba(218,165,32,0.3); cursor: pointer; transition: all 0.3s; }
        .view-3d .stage-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .view-3d .stage-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
        .view-3d .stage-card .sc-year { color: #A0522D; font-size: 0.72rem; font-weight: bold; }
        .view-3d .stage-card .sc-label { color: #8B4513; font-size: 0.82rem; font-weight: bold; }
        .view-3d .stage-card .sc-desc { color: #666; font-size: 0.72rem; margin-top: 3px; }
        .view-2d .stage-cards { display: none; }

        /* 弹窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.visible { display: flex; }
        .modal-box { background: rgba(255,248,220,0.97); border-radius: 16px; padding: 28px; max-width: 600px; width: 90vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); position: relative; border: 2px solid #DAA520; }
        .modal-box h2 { color: #8B4513; font-family: 'KaiTi','SimSun',serif; font-size: 1.3rem; margin-bottom: 16px; text-align: center; }
        .modal-close { position: absolute; top: 12px; right: 16px; font-size: 1.5rem; color: #8B4513; cursor: pointer; }
        .modal-close:hover { color: #c0392b; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; color: #8B4513; font-weight: bold; margin-bottom: 4px; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px 12px; border: 2px solid #DAA520; border-radius: 8px; font-size: 0.9rem; background: rgba(255,255,255,0.8); outline: none; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { border-color: #8B4513; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .modal-btns { display: flex; justify-content: center; gap: 10px; margin-top: 18px; }
        .modal-btns button { padding: 8px 24px; border-radius: 8px; cursor: pointer; font-family: 'KaiTi','SimSun',serif; font-size: 0.95rem; transition: all 0.3s; }
        .btn-save { background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border: none; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(139,69,19,0.3); }
        .btn-cancel { background: rgba(255,248,220,0.9); color: #8B4513; border: 2px solid #DAA520; }
        .btn-cancel:hover { background: #eee; }
        .btn-danger { background: #c0392b; color: #fff; border: none; }
        .btn-danger:hover { background: #e74c3c; }

        /* 图片预览 */
        .img-preview { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; align-items: center; justify-content: center; cursor: pointer; }
        .img-preview.visible { display: flex; }
        .img-preview img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

        /* 照片预览区 */
        .photo-preview-area { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .photo-preview-item { position: relative; }
        .photo-preview-item img { width: 80px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #DAA520; }
        .photo-preview-item .remove-photo { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: #c0392b; color: #fff; border-radius: 50%; font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none; }

        .empty-hint { text-align: center; color: #A0522D; font-size: 0.95rem; padding: 40px 0; font-family: 'KaiTi','SimSun',serif; }

        
    </style>
</head>

    <main>
        <div class="house-page">
            <h1>老宅展示</h1>
            <p class="subtitle">记录家族宅基地变迁，回顾历史岁月</p>

            <div class="house-toolbar">
                <div class="search-box">
                    <input type="text" id="houseSearch" placeholder="搜索宅基地..." oninput="renderPlots()">
                    <button onclick="renderPlots()">搜索</button>
                </div>
                <div class="view-toggle">
                    <button class="active" onclick="switchView('2d')">时间线</button>
                    <button onclick="switchView('3d')">卡片展示</button>
                </div>
            </div>

            <div id="adminBar" class="admin-bar" style="display:none;">
                <button class="admin-btn" onclick="showAddPlotModal()">+ 新增宅基地</button>
            </div>

            <div id="plotContainer"></div>
        </div>
    </main>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeModal()">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">编辑</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- 图片预览 -->
    <div class="img-preview" id="imgPreview" onclick="this.classList.remove('visible')">
        <img id="previewImg" src="">
    </div>

    <footer><div class="container"><p>&copy; 2026 家族族谱网站. 保留所有权利.</p></div></footer>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script>
        let currentView = '2d';
        const isAdminUser = authSystem.isLoggedIn() && authSystem.getCurrentUser() === 'admin';

        // 默认宅基地数据
        const defaultPlots = [
            {
                id: 'plot1', name: '老院',
                nodes: [
                    { id: 'n1', year: '1850', label: '土坯茅草房', desc: '开荒立业时建造的简陋茅草房，三间正房，冬冷夏热。', photos: ['https://images.unsplash.com/photo-1593214925072-e9a4b09e6d26?w=600&q=80'] },
                    { id: 'n2', year: '1880', label: '青砖瓦房', desc: '家境好转后翻建为青砖瓦房，五间正房带院落。', photos: ['https://images.unsplash.com/photo-1564013748062-0a6fd1c7f0d0?w=600&q=80'] },
                    { id: 'n3', year: '1930', label: '四合院', desc: '在祖宅基础上扩建为标准四合院，正房、厢房齐全，青砖灰瓦。', photos: ['https://images.unsplash.com/photo-1585436414541-7a7e3f0c9e0b?w=600&q=80'] },
                    { id: 'n4', year: '2010', label: '保护修缮', desc: '对老宅进行全面修缮保护，保留传统风貌，改善内部设施。', photos: ['https://images.unsplash.com/photo-1564013748062-0a6fd1c7f0d0?w=600&q=80'] }
                ]
            },
            {
                id: 'plot2', name: '东院',
                nodes: [
                    { id: 'n5', year: '1960', label: '砖混平房', desc: '在老宅旁新建砖混结构平房，改善居住条件。', photos: ['https://images.unsplash.com/photo-1560185008-5a5a5a5a5a5a?w=600&q=80'] },
                    { id: 'n6', year: '1990', label: '二层小楼', desc: '翻建为二层小楼，现代化设施齐全。', photos: ['https://images.unsplash.com/photo-1564013748062-0a6fd1c7f0d0?w=600&q=80'] }
                ]
            },
            {
                id: 'plot3', name: '新居',
                nodes: [
                    { id: 'n7', year: '2000', label: '城市商品房', desc: '购买城市商品房，三室两厅，生活条件大幅改善。', photos: ['https://images.unsplash.com/photo-1585436414541-7a7e3f0c9e0b?w=600&q=80'] },
                    { id: 'n8', year: '2020', label: '改善型住房', desc: '换购大面积改善型住房，四室两厅。', photos: ['https://images.unsplash.com/photo-1560185008-5a5a5a5a5a5a?w=600&q=80'] }
                ]
            }
        ];

        // 数据管理
        function getPlotsData() {
            try {
                const raw = localStorage.getItem('familyHousePlots');
                if (raw) return JSON.parse(raw);
            } catch(e) {}
            return JSON.parse(JSON.stringify(defaultPlots));
        }
        function savePlotsData(data) {
            localStorage.setItem('familyHousePlots', JSON.stringify(data));
        }
        function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

        // 压缩图片
        function compressImage(dataUrl, maxW, maxH, quality) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });
        }

        // 渲染
        function renderPlots() {
            const container = document.getElementById('plotContainer');
            const keyword = document.getElementById('houseSearch').value.trim().toLowerCase();
            const plots = getPlotsData();

            // admin bar
            document.getElementById('adminBar').style.display = isAdminUser ? 'flex' : 'none';

            if (plots.length === 0) {
                container.innerHTML = '<div class="empty-hint">暂无宅基地数据</div>';
                return;
            }

            let filteredPlots = plots;
            if (keyword) {
                filteredPlots = plots.filter(p =>
                    p.name.toLowerCase().includes(keyword) ||
                    p.nodes.some(n => n.label.toLowerCase().includes(keyword) || n.desc.toLowerCase().includes(keyword) || n.year.includes(keyword))
                );
            }

            const grid = document.createElement('div');
            grid.className = 'plot-grid';

            filteredPlots.forEach(plot => {
                const card = document.createElement('div');
                card.className = 'plot-card';

                // header
                let adminBtns = '';
                if (isAdminUser) {
                    adminBtns = `<div class="plot-admin-btns">
                        <button onclick="showEditPlotModal('${plot.id}')">编辑</button>
                        <button onclick="deletePlot('${plot.id}')">删除</button>
                    </div>`;
                }

                // body
                let bodyHTML = '';
                if (currentView === '2d') {
                    bodyHTML = renderTimelineView(plot);
                } else {
                    bodyHTML = renderCardView(plot);
                }

                card.innerHTML = `
                    <div class="plot-card-header">
                        <h3>${plot.name}</h3>
                        ${adminBtns}
                    </div>
                    <div class="plot-card-body ${currentView === '3d' ? 'view-3d' : 'view-2d'}">${bodyHTML}</div>
                `;
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        function renderTimelineView(plot) {
            let html = '<div class="timeline">';
            plot.nodes.forEach(node => {
                let photosHTML = '';
                if (node.photos && node.photos.length > 0) {
                    photosHTML = '<div class="node-photos">';
                    node.photos.forEach((src, i) => {
                        photosHTML += `<img src="${src}" alt="${node.label}" onclick="previewImage('${src.replace(/'/g,"\\'")}')">`;
                    });
                    photosHTML += '</div>';
                }
                let actionsHTML = '';
                if (isAdminUser) {
                    actionsHTML = `<div class="node-actions">
                        <button onclick="showEditNodeModal('${plot.id}','${node.id}')">编辑</button>
                        <button onclick="deleteNode('${plot.id}','${node.id}')">删除</button>
                    </div>`;
                }
                html += `<div class="timeline-node">
                    <div class="node-year">${node.year}年</div>
                    <div class="node-label">${node.label}</div>
                    <div class="node-desc">${node.desc}</div>
                    ${photosHTML}
                    ${actionsHTML}
                </div>`;
            });
            html += '</div>';
            if (isAdminUser) {
                html += `<div class="add-node-btn" onclick="showAddNodeModal('${plot.id}')">+ 添加时间节点</div>`;
            }
            return html;
        }

        function renderCardView(plot) {
            let html = '<div class="stage-cards">';
            plot.nodes.forEach(node => {
                const img = node.photos && node.photos[0]
                    ? `<img src="${node.photos[0]}" alt="${node.label}" onclick="previewImage('${node.photos[0].replace(/'/g,"\\'")}')">`
                    : '<div style="height:120px;background:#eee;border-radius:8px;"></div>';
                html += `<div class="stage-card">
                    ${img}
                    <div class="sc-year">${node.year}年</div>
                    <div class="sc-label">${node.label}</div>
                    <div class="sc-desc">${node.desc}</div>
                </div>`;
            });
            html += '</div>';
            if (isAdminUser) {
                html += `<div class="add-node-btn" onclick="showAddNodeModal('${plot.id}')">+ 添加时间节点</div>`;
            }
            return html;
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.view-toggle button:nth-child(${view === '2d' ? 1 : 2})`).classList.add('active');
            renderPlots();
        }

        function previewImage(src) {
            document.getElementById('previewImg').src = src;
            document.getElementById('imgPreview').classList.add('visible');
        }

        // ===== Admin: 宅基地管理 =====

        function showAddPlotModal() {
            document.getElementById('modalTitle').textContent = '新增宅基地';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>宅基地名称</label>
                    <input type="text" id="plotNameInput" placeholder="如：老院、东院、新居...">
                </div>
                <div class="modal-btns">
                    <button class="btn-save" onclick="saveAddPlot()">保存</button>
                    <button class="btn-cancel" onclick="closeModal()">取消</button>
                </div>
            `;
            showModal();
        }

        function saveAddPlot() {
            const name = document.getElementById('plotNameInput').value.trim();
            if (!name) { alert('请输入宅基地名称'); return; }
            const plots = getPlotsData();
            plots.push({ id: genId(), name: name, nodes: [] });
            savePlotsData(plots);
            closeModal();
            renderPlots();
        }

        function showEditPlotModal(plotId) {
            const plots = getPlotsData();
            const plot = plots.find(p => p.id === plotId);
            if (!plot) return;
            document.getElementById('modalTitle').textContent = '编辑宅基地';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>宅基地名称</label>
                    <input type="text" id="plotNameInput" value="${plot.name}">
                </div>
                <div class="modal-btns">
                    <button class="btn-save" onclick="saveEditPlot('${plotId}')">保存</button>
                    <button class="btn-cancel" onclick="closeModal()">取消</button>
                </div>
            `;
            showModal();
        }

        function saveEditPlot(plotId) {
            const name = document.getElementById('plotNameInput').value.trim();
            if (!name) { alert('请输入宅基地名称'); return; }
            const plots = getPlotsData();
            const plot = plots.find(p => p.id === plotId);
            if (plot) { plot.name = name; savePlotsData(plots); }
            closeModal();
            renderPlots();
        }

        function deletePlot(plotId) {
            if (!confirm('确定删除该宅基地及其所有时间节点？')) return;
            const plots = getPlotsData().filter(p => p.id !== plotId);
            savePlotsData(plots);
            renderPlots();
        }

        // ===== Admin: 时间节点管理 =====

        let pendingNodePhotos = [];

        function showAddNodeModal(plotId) {
            pendingNodePhotos = [];
            document.getElementById('modalTitle').textContent = '添加时间节点';
            document.getElementById('modalBody').innerHTML = getNodeFormHTML(plotId, null);
            showModal();
        }

        function showEditNodeModal(plotId, nodeId) {
            const plots = getPlotsData();
            const plot = plots.find(p => p.id === plotId);
            if (!plot) return;
            const node = plot.nodes.find(n => n.id === nodeId);
            if (!node) return;
            pendingNodePhotos = [...(node.photos || [])];
            document.getElementById('modalTitle').textContent = '编辑时间节点';
            document.getElementById('modalBody').innerHTML = getNodeFormHTML(plotId, node);
            renderPhotoPreviews();
            showModal();
        }

        function getNodeFormHTML(plotId, node) {
            return `
                <div class="form-group">
                    <label>年份</label>
                    <input type="text" id="nodeYearInput" placeholder="如：1850、1990" value="${node ? node.year : ''}">
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="nodeLabelInput" placeholder="如：青砖瓦房、二层小楼" value="${node ? node.label : ''}">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="nodeDescInput" placeholder="描述该时间节点的房屋情况...">${node ? node.desc : ''}</textarea>
                </div>
                <div class="form-group">
                    <label>照片</label>
                    <input type="file" id="nodePhotoInput" accept="image/*" multiple onchange="handleNodePhotos(event)">
                    <div class="photo-preview-area" id="photoPreviewArea"></div>
                </div>
                <div class="modal-btns">
                    <button class="btn-save" onclick="saveNode('${plotId}', ${node ? "'" + node.id + "'" : 'null'})">保存</button>
                    <button class="btn-cancel" onclick="closeModal()">取消</button>
                </div>
            `;
        }

        async function handleNodePhotos(event) {
            const files = Array.from(event.target.files);
            for (const file of files) {
                const dataUrl = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
                const compressed = await compressImage(dataUrl, 800, 600, 0.7);
                pendingNodePhotos.push(compressed);
            }
            renderPhotoPreviews();
            event.target.value = '';
        }

        function renderPhotoPreviews() {
            const area = document.getElementById('photoPreviewArea');
            if (!area) return;
            area.innerHTML = pendingNodePhotos.map((src, i) => `
                <div class="photo-preview-item">
                    <img src="${src}" alt="照片">
                    <button class="remove-photo" onclick="pendingNodePhotos.splice(${i},1);renderPhotoPreviews()">&times;</button>
                </div>
            `).join('');
        }

        function saveNode(plotId, nodeId) {
            const year = document.getElementById('nodeYearInput').value.trim();
            const label = document.getElementById('nodeLabelInput').value.trim();
            const desc = document.getElementById('nodeDescInput').value.trim();
            if (!year || !label) { alert('请填写年份和标题'); return; }

            const plots = getPlotsData();
            const plot = plots.find(p => p.id === plotId);
            if (!plot) return;

            if (nodeId) {
                // 编辑
                const node = plot.nodes.find(n => n.id === nodeId);
                if (node) {
                    node.year = year;
                    node.label = label;
                    node.desc = desc;
                    node.photos = [...pendingNodePhotos];
                }
            } else {
                // 新增
                plot.nodes.push({ id: genId(), year, label, desc, photos: [...pendingNodePhotos] });
            }

            try {
                savePlotsData(plots);
            } catch(e) {
                alert('保存失败，存储空间不足，请减少照片数量');
                return;
            }
            pendingNodePhotos = [];
            closeModal();
            renderPlots();
        }

        function deleteNode(plotId, nodeId) {
            if (!confirm('确定删除该时间节点？')) return;
            const plots = getPlotsData();
            const plot = plots.find(p => p.id === plotId);
            if (plot) {
                plot.nodes = plot.nodes.filter(n => n.id !== nodeId);
                savePlotsData(plots);
            }
            renderPlots();
        }

        // 弹窗控制
        function showModal() { document.getElementById('editModal').classList.add('visible'); }
        function closeModal() { document.getElementById('editModal').classList.remove('visible'); pendingNodePhotos = []; }

        // 初始化
        renderPlots();
    </script>
</body>
</html>
