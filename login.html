<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no">
    <title>登录 - 家族族谱网站</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255,248,220,0.95); border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 8px 30px rgba(0,0,0,0.15); border: 2px solid #DAA520; }
        .login-card h1 { text-align: center; color: #8B4513; font-family: 'KaiTi','SimSun',serif; font-size: 1.8rem; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; color: #A0522D; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #8B4513; font-weight: bold; margin-bottom: 6px; font-size: 0.95rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #DAA520; border-radius: 10px; font-size: 1rem; background: rgba(255,255,255,0.8); outline: none; transition: all 0.3s; }
        .form-group input:focus { border-color: #8B4513; box-shadow: 0 0 8px rgba(139,69,19,0.2); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border: none; border-radius: 10px; font-size: 1.1rem; font-family: 'KaiTi','SimSun',serif; cursor: pointer; transition: all 0.3s; letter-spacing: 4px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        .login-error { color: #c0392b; text-align: center; font-size: 0.9rem; margin-top: 12px; display: none; }
        .login-hint { text-align: center; color: #A0522D; font-size: 0.8rem; margin-top: 20px; padding-top: 15px; border-top: 1px solid #DAA520; }
        .guest-link { text-align: center; margin-top: 15px; }
        .guest-link a { color: #8B4513; text-decoration: none; font-size: 0.9rem; }
        .guest-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">家族族谱</div>
            <ul class="nav-menu">
                <li><a href="index.html"><span class="nav-icon">&#9750;</span><span class="nav-text">首页</span></a></li>
                <li><a href="about.html"><span class="nav-icon">&#9733;</span><span class="nav-text">关于我们</span></a></li>
                <li><a href="login.html"><span class="nav-icon">&#9967;</span><span class="nav-text">登录</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-page">
            <div class="login-card">
                <h1>家族成员登录</h1>
                <p class="subtitle">登录后可查看族谱树、成员详情、墓地地图等</p>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入姓名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="login-btn">登 录</button>
                    <p class="login-error" id="loginError">用户名或密码错误</p>
                </form>
                <p class="login-hint">提示：默认账号为姓名，密码为 zhang123<br>管理员账号：admin / admin123</p>
                <div class="guest-link"><a href="index.html">以游客身份继续浏览</a></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container"><p>&copy; 2026 家族族谱网站. 保留所有权利.</p></div>
    </footer>

    <script src="auth.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (authSystem.login(username, password)) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>

    <script>
    // 强制横屏：竖屏时显示提示遮罩
    (function() {
        var style = document.createElement('style');
        style.textContent = '@media screen and (orientation: portrait) { #landscapeOverlay { display: flex !important; } } #landscapeOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,55,40,0.97); z-index: 99999; align-items: center; justify-content: center; flex-direction: column; } #landscapeOverlay .rotate-icon { font-size: 4rem; animation: rotateHint 2s ease-in-out infinite; margin-bottom: 20px; } @keyframes rotateHint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } } #landscapeOverlay .hint-text { color: #FFF8DC; font-size: 1.3rem; font-family: KaiTi,SimSun,serif; letter-spacing: 3px; }';
        document.head.appendChild(style);
        var overlay = document.createElement('div');
        overlay.id = 'landscapeOverlay';
        overlay.innerHTML = '<div class="rotate-icon">&#128241;</div><div class="hint-text">请横屏查看以获得最佳体验</div>';
        document.body.appendChild(overlay);
    })();
    </script>
</body>
</html>
