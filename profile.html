<!DOCTYPE html>

    <link rel="stylesheet" href="styles.css">
    <style>
        .profile-page { max-width: 1500px; margin: 0 auto; padding: 20px; }
        .profile-banner { position: relative; height: 160px; background: linear-gradient(135deg,#A0522D 0%,#CD853F 40%,#DEB887 80%,#F5DEB3 100%); border-radius: 16px 16px 0 0; overflow: hidden; }
        .profile-banner-pattern { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.06; background-image: repeating-linear-gradient(45deg, #8B4513 0, #8B4513 1px, transparent 1px, transparent 14px); }
        .profile-main-card { background: rgba(255,250,235,0.97); border-radius: 0 0 16px 16px; padding: 0 30px 30px; box-shadow: 0 6px 25px rgba(0,0,0,0.1); }
        .avatar-row { display: flex; align-items: flex-end; gap: 20px; margin-top: -45px; margin-bottom: 24px; position: relative; z-index: 2; }
        .avatar-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
        .avatar-img { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #FFF8DC; box-shadow: 0 4px 15px rgba(0,0,0,0.15); object-fit: cover; background: linear-gradient(135deg,#A0522D,#CD853F); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #FFF8DC; overflow: hidden; }
        .avatar-img img { width: 100%; height: 100%; object-fit: cover; }

        .avatar-upload-btn:hover { transform: scale(1.1); }
        .profile-name-area { padding-bottom: 10px; padding-top: 8px; }
        .profile-name { font-family: 'KaiTi','SimSun',serif; font-size: 1.5rem; color: #3E2723; font-weight: bold; }
        .profile-role { color: #8B7355; font-size: 0.82rem; margin-top: 4px; }
        .profile-signature { color: #A0522D; font-size: 0.82rem; margin-top: 6px; font-style: italic; line-height: 1.4; }
        .signature-edit { color: #A0522D; font-size: 0.72rem; cursor: pointer; margin-left: 6px; font-style: normal; }
        .signature-edit:hover { text-decoration: underline; }
        .info-section { margin-bottom: 20px; }
        .info-section-title { font-size: 0.82rem; color: #A0522D; font-weight: bold; letter-spacing: 2px; margin-bottom: 12px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
        .info-item { display: flex; gap: 8px; align-items: baseline; }
        .info-item .label { color: #8B7355; font-size: 0.82rem; min-width: 72px; }
        .info-item .value { color: #3E2723; font-size: 0.88rem; }
        .lunar-text { color: #A0522D; font-size: 0.78rem; margin-left: 4px; }
        .birthday-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .birthday-row input[type="date"] { padding: 5px 10px; border: 1.5px solid #DAA520; border-radius: 6px; font-size: 0.82rem; background: rgba(255,255,255,0.8); outline: none; }
        .birthday-row input:focus { border-color: #8B4513; }
        .action-bar { display: flex; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(218,165,32,0.2); flex-wrap: wrap; }
        .action-btn { padding: 8px 18px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .action-btn.pw { background: rgba(139,69,19,0.06); color: #8B4513; border: 1.5px solid rgba(139,69,19,0.15); }
        .action-btn.pw:hover { background: rgba(139,69,19,0.12); }
        .action-btn.logout { background: rgba(192,57,43,0.05); color: #c0392b; border: 1.5px solid rgba(192,57,43,0.15); }
        .action-btn.logout:hover { background: #c0392b; color: white; border-color: #c0392b; }
        .pw-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease; background: rgba(139,69,19,0.03); border-radius: 10px; margin-top: 0; }
        .pw-panel.open { max-height: 300px; padding: 18px; margin-top: 14px; }
        .pw-panel .pw-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .pw-panel label { color: #8B7355; font-size: 0.82rem; min-width: 80px; }
        .pw-panel input { padding: 8px 12px; border: 1.5px solid #DAA520; border-radius: 6px; font-size: 0.82rem; background: rgba(255,255,255,0.8); outline: none; flex: 1; max-width: 240px; }

        .pw-panel .pw-submit { padding: 8px 20px; background: linear-gradient(135deg,#8B4513,#A0522D); color: #FFF8DC; border: none; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
        .pw-msg { font-size: 0.8rem; margin-top: 6px; }
        .posts-section { background: rgba(255,250,235,0.97); border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .posts-section h3 { color: #5D3A1A; font-family: 'KaiTi','SimSun',serif; font-size: 1.05rem; margin-bottom: 16px; }

        .almanac-items { display: flex; flex-wrap: wrap; gap: 6px; }
        .almanac-tag { padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; }

        .almanac-tag.ji { background: rgba(192,57,43,0.1); color: #c0392b; border: 1px solid rgba(192,57,43,0.2); }
        /* 节日倒数 */

        .countdown-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: rgba(139,69,19,0.04); border-radius: 8px; border-left: 3px solid #DAA520; }

        .countdown-date { color: #8B7355; font-size: 0.72rem; }
        .countdown-days { color: #A0522D; font-size: 0.88rem; font-weight: bold; font-family: 'KaiTi','SimSun',serif; }
        .countdown-days .num { font-size: 1.1rem; color: #8B4513; }

        
    </style>

    <script>
        if (!authSystem.isLoggedIn()) { window.location.href = 'login.html'; }
        const currentUser = authSystem.getCurrentUser();
        let pendingImages = [];

        // 压缩图片：限制最大宽高，降低质量
        function compressImage(dataUrl, maxW, maxH, quality) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = h * maxW / w; w = maxW; }
                    if (h > maxH) { w = w * maxH / h; h = maxH; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });
        }

        function solarToLunar(year, month, day) {
            try {
                const date = new Date(year, month - 1, day);
                const formatter = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', { year: 'numeric', month: 'long', day: 'numeric' });
                return formatter.format(date);
            } catch(e) { return ''; }
        }

        function getProfileData() { return JSON.parse(sessionStorage.getItem('familyProfile_' + currentUser) || localStorage.getItem('familyProfile_' + currentUser) || '{}'); }
        function saveProfileData(data) {
            const jsonStr = JSON.stringify(data);
            localStorage.setItem('familyProfile_' + currentUser, jsonStr);
            sessionStorage.setItem('familyProfile_' + currentUser, jsonStr);
        }

        function uploadAvatar(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(ev) {
                const compressed = await compressImage(ev.target.result, 300, 300, 0.85);
                const data = getProfileData();
                data.avatar = compressed;
                try {
                    saveProfileData(data);
                } catch(err) {
                    console.error('保存头像失败，可能超出存储容量:', err);
                    alert('头像保存失败，请尝试上传更小的图片');
                    return;
                }
                loadProfile();
                authSystem.updateNavbar();
            };
            reader.readAsDataURL(file);
        }

        function loadProfile() {
            const userInfo = authSystem.getUserInfo(currentUser);
            const profileData = getProfileData();
            const avatarEl = document.getElementById('profileAvatar');

            if (profileData.avatar) {
                avatarEl.innerHTML = `<img src="${profileData.avatar}" alt="头像">`;
            } else {
                avatarEl.textContent = currentUser.charAt(0);
            }

            // 同步更新导航栏头像
            authSystem.updateNavbar();

            document.getElementById('profileName').textContent = currentUser;
            document.getElementById('profileRole').textContent = userInfo.role;

            const newPost = {

            const ci = circlePosts.findIndex(p => p.user === deleted.user && p.time === deleted.time && p.content === deleted.content);

        function loadWeather() {

            fetch('https://wttr.in/?format=j1', { signal: AbortSignal.timeout(5000) })
                .then(r => r.json())
                .then(data => {
                    const cur = data.current_condition[0];
                    const icon = getWeatherIcon(cur.weatherCode);
                    // 获取地区信息
                    let location = '';
                    if (data.nearest_area && data.nearest_area[0]) {
                        const area = data.nearest_area[0];
                        const parts = [];
                        if (area.areaName && area.areaName[0]) parts.push(area.areaName[0].value);
                        if (area.region && area.region[0]) parts.push(area.region[0].value);
                        if (area.country && area.country[0]) parts.push(area.country[0].value);
                        location = parts.join(', ');
                    }
                    const locHTML = location ? `<div class="weather-loc">&#128205; ${location}</div>` : '';
                    el.innerHTML = `
                        <div class="weather-content">
                            <div class="weather-icon">${icon}</div>
                            <div class="weather-info">
                                <div class="weather-temp">${cur.temp_C}°C</div>
                                <div class="weather-desc">${langWeatherDesc(cur.weatherDesc[0].value)}</div>
                                <div class="weather-detail">湿度 ${cur.humidity}% | 风速 ${cur.windspeedKmph}km/h</div>
                                ${locHTML}
                            </div>
                        </div>`;
                })
                .catch(() => {
                    el.innerHTML = '<span class="weather-err">天气信息暂不可用</span>';
                });
        }
        function getWeatherIcon(code) {
            const c = parseInt(code);
            if (c === 113) return '&#9728;';
            if (c === 116) return '&#9925;';
            if ([119,122].includes(c)) return '&#9729;';
            if ([176,263,266,293,296,299,302,305,308,353,356,359].includes(c)) return '&#127783;';
            if ([179,182,185,227,230,323,326,329,332,335,338,368,371,374,377,392,395].includes(c)) return '&#127784;';
            if ([200,386,389,392,395].includes(c)) return '&#9889;';
            return '&#9925;';
        }

            const map = {'Sunny':'晴','Clear':'晴','Partly cloudy':'多云','Cloudy':'阴','Overcast':'阴天','Mist':'薄雾','Fog':'雾','Light rain':'小雨','Moderate rain':'中雨','Heavy rain':'大雨','Light snow':'小雪','Moderate snow':'中雪','Heavy snow':'大雪','Thunderstorm':'雷暴','Patchy rain possible':'可能有零星小雨','Patchy snow possible':'可能有零星小雪'};
            return map[desc] || desc;
        }

        // ===== 黄历（今日宜忌）=====
        function renderAlmanac() {
            const el = document.getElementById('almanacContent');
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
            const weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

            // 农历
            let lunarStr = '';
            try {
                const formatter = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', { year: 'numeric', month: 'long', day: 'numeric' });
                lunarStr = formatter.format(now);
            } catch(e) { lunarStr = ''; }

            // 天干地支年
            const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
            const diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
            const shengXiao = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
            const ganIdx = (y - 4) % 10;
            const zhiIdx = (y - 4) % 12;
            const ganZhiYear = tianGan[ganIdx] + diZhi[zhiIdx] + '年';
            const sx = shengXiao[zhiIdx];

            // 基于日期生成宜忌（伪随机但每天固定）
            const seed = y * 10000 + m * 100 + d;
            function seededRandom(s) { let x = Math.sin(s) * 10000; return x - Math.floor(x); }

            const allYi = ['祭祀','祈福','求嗣','开光','出行','解除','伐木','拆卸','修造','起基','动土','上梁','移徙','入宅','开市','交易','立券','挂匾','栽种','牧养','纳畜','安葬','修坟','立碑','破土','启钻','除服','成服','嫁娶','纳采','冠笄','开仓','纳财','造桥','乘船','针灸','词讼','行丧','扫舍'];
            const allJi = ['开市','动土','破土','安葬','修坟','嫁娶','纳采','祈福','斋醮','开光','出行','移徙','入宅','安香','挂匾','开仓','造桥','乘船','针灸','词讼','行丧','扫舍','伐木','拆卸','修造','起基','上梁','立券','交易','纳财','栽种','牧养','纳畜','祭祀','求嗣','解除','冠笄','安床','造床'];

            // 选6-8个宜和5-7个忌
            const yiCount = 6 + Math.floor(seededRandom(seed) * 3);
            const jiCount = 5 + Math.floor(seededRandom(seed + 1) * 3);
            const yiItems = [], jiItems = [];
            const usedYi = new Set(), usedJi = new Set();
            for (let i = 0; i < yiCount; i++) {
                let idx = Math.floor(seededRandom(seed + i * 7 + 3) * allYi.length);
                let attempts = 0;
                while (usedYi.has(idx) && attempts < 20) { idx = (idx + 1) % allYi.length; attempts++; }
                usedYi.add(idx); yiItems.push(allYi[idx]);
            }
            for (let i = 0; i < jiCount; i++) {
                let idx = Math.floor(seededRandom(seed + i * 13 + 7) * allJi.length);
                let attempts = 0;
                while (usedJi.has(idx) && attempts < 20) { idx = (idx + 1) % allJi.length; attempts++; }
                usedJi.add(idx); jiItems.push(allJi[idx]);
            }

            el.innerHTML = `
                <div class="almanac-date">${y}年${m}月${d}日 ${weekDays[now.getDay()]}</div>
                <div class="almanac-lunar">${lunarStr} | ${ganZhiYear}（${sx}年）</div>
                <div class="almanac-row">
                    <div class="almanac-label">宜</div>
                    <div class="almanac-items">${yiItems.map(x => `<span class="almanac-tag yi">${x}</span>`).join('')}</div>
                </div>
                <div class="almanac-row">
                    <div class="almanac-label">忌</div>
                    <div class="almanac-items">${jiItems.map(x => `<span class="almanac-tag ji">${x}</span>`).join('')}</div>
                </div>`;
        }
        renderAlmanac();

        // ===== 节日倒数 =====
        function renderCountdown() {
            const el = document.getElementById('countdownContent');
            const now = new Date();
            const y = now.getFullYear();

            // 二十四节气（近似日期）
            const solarTerms = [
                {name:'小寒', m:1, d:6}, {name:'大寒', m:1, d:20},
                {name:'立春', m:2, d:4}, {name:'雨水', m:2, d:19},
                {name:'惊蛰', m:3, d:6}, {name:'春分', m:3, d:21},
                {name:'清明', m:4, d:5}, {name:'谷雨', m:4, d:20},
                {name:'立夏', m:5, d:6}, {name:'小满', m:5, d:21},
                {name:'芒种', m:6, d:6}, {name:'夏至', m:6, d:21},
                {name:'小暑', m:7, d:7}, {name:'大暑', m:7, d:23},
                {name:'立秋', m:8, d:7}, {name:'处暑', m:8, d:23},
                {name:'白露', m:9, d:8}, {name:'秋分', m:9, d:23},
                {name:'寒露', m:10, d:8}, {name:'霜降', m:10, d:23},
                {name:'立冬', m:11, d:7}, {name:'小雪', m:11, d:22},
                {name:'大雪', m:12, d:7}, {name:'冬至', m:12, d:22}
            ];

            // 传统节日（农历转公历近似）
            const festivals = [
                {name:'春节', getDate: yr => lunarApprox(yr, 1, 1)},
                {name:'元宵节', getDate: yr => lunarApprox(yr, 1, 15)},
                {name:'端午节', getDate: yr => lunarApprox(yr, 5, 5)},
                {name:'七夕节', getDate: yr => lunarApprox(yr, 7, 7)},
                {name:'中秋节', getDate: yr => lunarApprox(yr, 8, 15)},
                {name:'重阳节', getDate: yr => lunarApprox(yr, 9, 9)},
                {name:'腊八节', getDate: yr => lunarApprox(yr, 12, 8)},
                {name:'除夕', getDate: yr => lunarApprox(yr, 12, 30)},
                {name:'元旦', getDate: yr => new Date(yr, 0, 1)},
                {name:'劳动节', getDate: yr => new Date(yr, 4, 1)},
                {name:'国庆节', getDate: yr => new Date(yr, 9, 1)}
            ];

            // 农历转公历近似（查表法，覆盖2024-2030）
            const lunarTable = {
                2024:{'1-1':[2,10],'1-15':[2,24],'5-5':[6,10],'7-7':[8,10],'8-15':[9,17],'9-9':[10,11],'12-8':[1,7],'12-30':[1,28]},
                2025:{'1-1':[1,29],'1-15':[2,12],'5-5':[5,31],'7-7':[8,2],'8-15':[9,6],'9-9':[10,29],'12-8':[1,7],'12-30':[1,28]},
                2026:{'1-1':[2,17],'1-15':[3,3],'5-5':[6,19],'7-7':[8,21],'8-15':[10,4],'9-9':[10,27],'12-8':[1,5],'12-30':[1,26]},
                2027:{'1-1':[2,6],'1-15':[2,20],'5-5':[6,8],'7-7':[8,10],'8-15':[9,23],'9-9':[10,16],'12-8':[1,5],'12-30':[1,26]},
                2028:{'1-1':[1,26],'1-15':[2,9],'5-5':[5,28],'7-7':[5,30],'8-15':[9,12],'9-9':[10,5],'12-8':[1,5],'12-30':[1,25]},
                2029:{'1-1':[2,13],'1-15':[2,27],'5-5':[6,16],'7-7':[8,17],'8-15':[10,1],'9-9':[10,24],'12-8':[1,5],'12-30':[1,25]},
                2030:{'1-1':[2,3],'1-15':[2,17],'5-5':[6,5],'7-7':[8,7],'8-15':[9,20],'9-9':[10,13],'12-8':[1,5],'12-30':[1,25]}
            };
            function lunarApprox(yr, lm, ld) {
                const key = lm + '-' + ld;
                if (lunarTable[yr] && lunarTable[yr][key]) {
                    const [sm, sd] = lunarTable[yr][key];
                    return new Date(yr, sm - 1, sd);
                }
                // 简易近似
                const approx = new Date(yr, lm - 1, ld);
                approx.setDate(approx.getDate() + 30);
                return approx;
            }

            // 收集所有未来日期
            const events = [];
            solarTerms.forEach(st => {
                for (let yr = y; yr <= y + 1; yr++) {
                    const date = new Date(yr, st.m - 1, st.d);
                    if (date > now) events.push({name: st.name, date: date, type: 'term'});
                }
            });
            festivals.forEach(f => {
                for (let yr = y; yr <= y + 1; yr++) {
                    const date = f.getDate(yr);
                    if (date && date > now) events.push({name: f.name, date: date, type: 'festival'});
                }
            });

            // 排序取最近的8个
            events.sort((a, b) => a.date - b.date);
            const upcoming = events.slice(0, 8);

            if (upcoming.length === 0) {
                el.innerHTML = '<div class="weather-err">暂无数据</div>';
                return;
            }

            el.innerHTML = '<div class="countdown-list">' + upcoming.map(ev => {
                const diff = Math.ceil((ev.date - now) / 86400000);
                const dateStr = `${ev.date.getFullYear()}.${ev.date.getMonth()+1}.${ev.date.getDate()}`;
                return `<div class="countdown-item">
                    <div><div class="countdown-name">${ev.name}</div><div class="countdown-date">${dateStr}</div></div>
                    <div class="countdown-days"><span class="num">${diff}</span> 天</div>
                </div>`;
            }).join('') + '</div>';
        }
        renderCountdown();
    </script>

    <script>

    (function() {

        style.textContent = '@media screen and (orientation: portrait) { #landscapeOverlay { display: flex !important; } } #landscapeOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,55,40,0.97); z-index: 99999; align-items: center; justify-content: center; flex-direction: column; } #landscapeOverlay .rotate-icon { font-size: 4rem; animation: rotateHint 2s ease-in-out infinite; margin-bottom: 20px; } @keyframes rotateHint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } } #landscapeOverlay .hint-text { color: #FFF8DC; font-size: 1.3rem; font-family: KaiTi,SimSun,serif; letter-spacing: 3px; }';
        document.head.appendChild(style);
        var overlay = document.createElement('div');

        document.body.appendChild(overlay);
    })();
    </script>
